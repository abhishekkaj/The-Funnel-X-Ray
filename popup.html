<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Funnel X-Ray</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="header">
        <h1>The Funnel <span>X-Ray</span></h1>
        <div class="status-indicator"></div>
    </div>

    <!-- Skeleton Loader State -->
    <div id="loading-state" class="state-container active">
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-title mt-4"></div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-title mt-4"></div>
        <div class="skeleton skeleton-text"></div>
    </div>

    <!-- Finalized Data View State -->
    <div id="data-state" class="state-container">

        <!-- Full Page Capture Controls -->
        <div id="capture-controls" style="margin-bottom: 20px; text-align: center;">
            <button id="capture-btn" class="btn"
                style="background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); width: 100%;">
                📸 Capture Full Page
            </button>

            <div id="capturing-state"
                style="display: none; padding: 12px; background: var(--surface-light); border-radius: 8px; border: 1px solid var(--accent); color: var(--accent); font-weight: 500; animation: pulse 2s infinite;">
                📸 Capturing... Please wait...
            </div>

            <div id="download-controls" style="display: none; display: flex; gap: 8px; margin-top: 12px;">
                <button id="download-png-btn" class="btn" style="flex: 1; font-size: 0.85rem; padding: 8px;">⬇️
                    PNG</button>
                <button id="download-pdf-btn" class="btn" style="flex: 1; font-size: 0.85rem; padding: 8px;">⬇️
                    PDF</button>
            </div>

            <!-- Hide flex originally since inline styles will override class display:none logic -->
            <script>document.getElementById('download-controls').style.display = 'none';</script>
        </div>

        <!-- Hidden Funnel Steps Accordion (Freemium) -->
        <div class="accordion" style="border-color: var(--accent);">
            <button class="accordion-header" aria-expanded="false" style="color: var(--accent);">
                <span class="icon">🕵️</span> Hidden Funnel Steps
                <span class="chevron"></span>
            </button>
            <div class="accordion-content">
                <div id="funnel-data" class="data-group relative-container"></div>
            </div>
        </div>

        <!-- Architecture Accordion -->
        <div class="accordion">
            <button class="accordion-header" aria-expanded="false">
                <span class="icon">🏗️</span> Architecture (WP)
                <span class="chevron"></span>
            </button>
            <div class="accordion-content">
                <div id="wp-data" class="data-group"></div>
            </div>
        </div>

        <!-- SEO X-Ray Accordion -->
        <div class="accordion">
            <button class="accordion-header" aria-expanded="false">
                <span class="icon">🔍</span> SEO X-Ray
                <span class="chevron"></span>
            </button>
            <div class="accordion-content">
                <div id="seo-data" class="data-group"></div>
            </div>
        </div>

        <!-- Brand & Design System Accordion -->
        <div class="accordion" style="border-color: #8b5cf6;">
            <button class="accordion-header" aria-expanded="false" style="color: #a78bfa;">
                <span class="icon">🎨</span> Brand & Design System
                <span class="chevron"></span>
            </button>
            <div class="accordion-content">
                <div id="design-data" class="data-group"></div>
            </div>
        </div>

        <!-- E-Commerce Stack Accordion -->
        <div class="accordion">
            <button class="accordion-header" aria-expanded="false">
                <span class="icon">🛒</span> E-Commerce Stack
                <span class="chevron"></span>
            </button>
            <div class="accordion-content">
                <div id="ecommerce-data" class="data-group"></div>
            </div>
        </div>

        <!-- Omnichannel Pixels Accordion -->
        <div class="accordion">
            <button class="accordion-header" aria-expanded="false">
                <span class="icon">📢</span> Omnichannel Pixels
                <span class="chevron"></span>
            </button>
            <div class="accordion-content">
                <div id="omnichannel-data" class="data-group"></div>
            </div>
        </div>

        <!-- Lead Magnets & Assets Accordion -->
        <div class="accordion">
            <button class="accordion-header" aria-expanded="false">
                <span class="icon">🧲</span> Lead Magnets & Assets
                <span class="chevron"></span>
            </button>
            <div class="accordion-content">
                <div id="assets-data" class="data-group"></div>
            </div>
        </div>

        <!-- Vault Export Button (for data) -->
        <div style="margin-top: 24px; text-align: center;">
            <button id="export-btn" class="btn btn-export">
                📥 Export Swipe JSON (<span id="export-count">0</span>/3 free)
            </button>
        </div>
    </div>

    <!-- Hidden Canvas for Full Page Stitching -->
    <canvas id="capture-canvas" style="display:none;"></canvas>

    <script src="jspdf.umd.min.js"></script>
    <script src="popup.js"></script>
</body>

</html>
